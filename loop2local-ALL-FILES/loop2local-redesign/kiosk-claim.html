<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop2local — รับคะแนน</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        .claim-wrap {
            min-height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; padding: 24px;
            text-align: center; gap: 20px;
        }
        .claim-card {
            background: var(--surface); border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg); padding: 40px 28px;
            max-width: 380px; width: 100%;
        }
        .claim-icon { font-size: 3.5rem; margin-bottom: 8px; }
        .claim-title { font-size: 1.5rem; font-weight: 800; color: var(--text-primary); margin: 0 0 8px; }
        .claim-sub { color: var(--text-secondary); font-size: 0.95rem; margin: 0 0 24px; }
        .claim-points { font-size: 3rem; font-weight: 800; color: var(--g-600); font-family: var(--mono); }
        .claim-spinner {
            width: 36px; height: 36px; border: 4px solid var(--g-100);
            border-top-color: var(--g-600); border-radius: 50%;
            animation: spin 0.8s linear infinite; margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-claim-action {
            width: 100%; padding: 14px; border-radius: var(--radius-md);
            background: var(--g-600); color: white; font-weight: 700;
            font-size: 1rem; font-family: var(--font); margin-top: 8px;
        }
        .btn-claim-action:hover { background: var(--g-700); }
        .claim-state { display: none; }
        .claim-state.show { display: block; }
    </style>
</head>
<body>
<div class="claim-wrap">
    <div class="claim-card">

        <!-- กำลังเช็คสถานะ -->
        <div class="claim-state show" id="stateLoading">
            <div class="claim-spinner"></div>
            <p class="claim-sub" style="margin-top:16px">กำลังตรวจสอบ...</p>
        </div>

        <!-- พร้อม claim (login แล้ว) -->
        <div class="claim-state" id="stateReady">
            <div class="claim-icon">♻️</div>
            <h1 class="claim-title">คุณได้รับคะแนน!</h1>
            <div class="claim-points" id="readyPoints">0</div>
            <p class="claim-sub">คะแนน จาก <span id="readyBottles">0</span> ขวด</p>
            <button class="btn-claim-action" onclick="confirmClaim()">รับคะแนนเลย</button>
        </div>

        <!-- claim สำเร็จ -->
        <div class="claim-state" id="stateSuccess">
            <div class="claim-icon">🎉</div>
            <h1 class="claim-title">รับคะแนนสำเร็จ!</h1>
            <p class="claim-sub">คะแนนถูกเพิ่มเข้าบัญชีของคุณแล้ว</p>
            <a href="points.html" class="btn-claim-action" style="display:block;text-decoration:none;box-sizing:border-box">ดูคะแนนของฉัน</a>
        </div>

        <!-- error: หมดอายุ / ถูก claim ไปแล้ว / ไม่พบ session -->
        <div class="claim-state" id="stateError">
            <div class="claim-icon">⚠️</div>
            <h1 class="claim-title">ไม่สามารถรับคะแนนได้</h1>
            <p class="claim-sub" id="errorMsg">QR Code นี้หมดอายุหรือถูกใช้ไปแล้ว</p>
            <a href="map.html" class="btn-claim-action" style="display:block;text-decoration:none;box-sizing:border-box">กลับหน้าหลัก</a>
        </div>

    </div>
</div>

<script src="script.js"></script>
<script>
/* ============================================
   Loop2local Kiosk Claim — Mobile Logic
   1. เช็ค session ID จาก URL
   2. เช็ค login (ถ้ายังไม่ login → เด้งไป login.html แล้วจำ session ไว้)
   3. claim point: อ่านจาก Realtime DB → เขียนเข้า Firestore user doc
   ============================================ */

const FIREBASE_RTDB_CONFIG = {
    databaseURL: "https://planning-with-ai-45b94-default-rtdb.asia-southeast1.firebasedatabase.app/"
};
const rtdbApp = firebase.initializeApp(FIREBASE_RTDB_CONFIG, "kioskRTDB");
const rtdb = rtdbApp.database();

const PENDING_CLAIM_KEY = 'eco2_pending_claim_session';

function getSessionIdFromUrl() {
    const params = new URLSearchParams(window.location.search);
    return params.get('session');
}

function showState(name) {
    document.querySelectorAll('.claim-state').forEach(el => el.classList.remove('show'));
    document.getElementById('state' + name).classList.add('show');
}

let pendingSessionData = null;
let pendingSessionId = null;

async function init() {
    // ขั้นที่ 1: หา session id — จาก URL ปัจจุบัน หรือจาก localStorage (ถ้าเพิ่ง login กลับมา)
    pendingSessionId = getSessionIdFromUrl() || localStorage.getItem(PENDING_CLAIM_KEY);

    if (!pendingSessionId) {
        document.getElementById('errorMsg').textContent = 'ไม่พบข้อมูล QR Code';
        showState('Error');
        return;
    }

    // ขั้นที่ 2: เช็ค login — ใช้ DB.getCurrentUser() ที่มีอยู่แล้วใน script.js
    // initFirebase() ของ script.js รันใน DOMContentLoaded ของตัวมันเอง ต้องรอให้พร้อมก่อน
    await waitForAuthReady();
    const user = await DB.getCurrentUser();

    if (!user) {
        // ยังไม่ login → จำ session ไว้ แล้วเด้งไป login
        localStorage.setItem(PENDING_CLAIM_KEY, pendingSessionId);
        window.location.href = 'login.html?redirect=kiosk-claim.html';
        return;
    }

    // ขั้นที่ 3: ดึงข้อมูล session จาก Realtime DB มาโชว์ก่อน confirm
    const sessionRef = rtdb.ref('kiosk_sessions/' + pendingSessionId);
    sessionRef.once('value', (snap) => {
        const session = snap.val();

        if (!session) {
            document.getElementById('errorMsg').textContent = 'QR Code นี้หมดอายุหรือถูกใช้ไปแล้ว';
            showState('Error');
            return;
        }
        if (session.status === 'claimed') {
            document.getElementById('errorMsg').textContent = 'QR Code นี้ถูกใช้ไปแล้ว';
            showState('Error');
            return;
        }
        if (session.status === 'expired') {
            document.getElementById('errorMsg').textContent = 'QR Code นี้หมดอายุแล้ว';
            showState('Error');
            return;
        }

        pendingSessionData = session;
        document.getElementById('readyPoints').textContent = session.points || 0;
        document.getElementById('readyBottles').textContent = session.bottle_count || 0;
        showState('Ready');
    });
}

// รอให้ Firebase Auth (Firestore app — ของเดิมใน script.js) พร้อมก่อนเช็ค user
function waitForAuthReady() {
    return new Promise((resolve) => {
        if (!USE_FIREBASE) { resolve(); return; }
        const check = () => {
            if (window._fb && firebaseAuth) {
                window._fb.onAuthStateChanged(firebaseAuth, () => resolve());
            } else {
                setTimeout(check, 100);
            }
        };
        check();
    });
}

async function confirmClaim() {
    showState('Loading');
    const user = await DB.getCurrentUser();
    if (!user || !pendingSessionData) {
        document.getElementById('errorMsg').textContent = 'เกิดข้อผิดพลาด กรุณาลองใหม่';
        showState('Error');
        return;
    }

    const pts = pendingSessionData.points || 0;
    const bottleCount = pendingSessionData.bottle_count || 0;

    try {
        // เขียนเข้า Firestore — ใช้ฟังก์ชันเดิมของระบบ ไม่ต้องเขียนใหม่
        await DB.addDonation(
            user.id,
            pts,
            `ทิ้งขวดที่ Smart Bin (${bottleCount} ขวด)`,
            1.0
        );

        // mark session ว่า claimed แล้วใน Realtime DB (ตู้จะเห็นแล้วโชว์หน้าสำเร็จ)
        await rtdb.ref('kiosk_sessions/' + pendingSessionId).update({ status: 'claimed' });

        localStorage.removeItem(PENDING_CLAIM_KEY);
        showState('Success');
    } catch (e) {
        console.error('Claim failed:', e);
        document.getElementById('errorMsg').textContent = 'เกิดข้อผิดพลาดในการรับคะแนน กรุณาลองใหม่';
        showState('Error');
    }
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
