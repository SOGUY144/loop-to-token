<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loop2local — สมัครสมาชิก</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrap">
    <div class="auth-ctrls">
        <div class="lang-toggle"><button class="lang-btn active" data-lang="th">TH</button><button class="lang-btn" data-lang="en">EN</button></div>
        <button class="theme-toggle"><svg class="icon-moon" viewBox="0 0 20 20" fill="currentColor"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg><svg class="icon-sun" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/></svg></button>
    </div>
    <div class="auth-left">
        <div class="ov"></div>
        <div class="auth-left-c">
            <a href="map.html" class="auth-logo">
                <div class="auth-logo-icon">
                    <img src="Logo.png" alt="Loop2local" style="width:100%;height:100%;object-fit:contain;border-radius:6px">
                </div>
                <span>Loop2local</span>
            </a>
            <h1><span data-i="heroL1">Together</span><br><span class="hl" data-i="heroL2">We can heal</span><br><span data-i="heroL3">The Earth</span></h1>
            <p data-i="heroSub">ร่วมติดตามและลดขยะจากการสั่ง delivery เพื่อโลกที่ดีกว่า</p>
            <div class="auth-stats">
                <div class="auth-stat"><b data-ct="158420">0</b><small data-i="s1">ขยะ delivery ที่เก็บได้</small></div>
                <div class="auth-stat"><b data-ct="12850">0</b><small data-i="s2">กล่องอาหารรีไซเคิล</small></div>
                <div class="auth-stat"><b data-ct="45600">0</b><small data-i="s3">ถุงพลาสติกที่ลดได้</small></div>
                <div class="auth-stat"><b data-ct="3240">0</b><small data-i="s4">สมาชิก</small></div>
            </div>
        </div>
    </div>
    <div class="auth-right">
        <div class="auth-form">
            <h2 data-i="regTitle">สร้างบัญชีใหม่</h2>
            <p class="sub" data-i="regSub">เริ่มต้นการเดินทางเพื่อลดขยะ delivery ไปด้วยกัน</p>
            <div class="inp-g"><label data-i="lName">ชื่อ-นามสกุล</label><div class="inp-w"><svg class="ic" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 18C3 14.13 6.13 11 10 11C13.87 11 17 14.13 17 18" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg><input type="text" id="regName" placeholder="สมชาย ใจดี"></div></div>
            <div class="inp-g"><label data-i="lEmail">อีเมล</label><div class="inp-w"><svg class="ic" viewBox="0 0 20 20" fill="none"><rect x="2" y="4" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M2 6L10 12L18 6" stroke="currentColor" stroke-width="1.4"/></svg><input type="email" id="regEmail" placeholder="you@example.com"></div></div>
            <div class="inp-g"><label data-i="lPhone">เบอร์โทรศัพท์</label><div class="inp-w"><svg class="ic" viewBox="0 0 20 20" fill="none"><rect x="5" y="1" width="10" height="18" rx="2" stroke="currentColor" stroke-width="1.4"/><line x1="8" y1="15" x2="12" y2="15" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg><input type="tel" id="regPhone" placeholder="08X-XXX-XXXX"></div></div>
            <div class="inp-g"><label data-i="lPass">รหัสผ่าน</label><div class="inp-w"><svg class="ic" viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 9V6C7 4.34 8.34 3 10 3C11.66 3 13 4.34 13 6V9" stroke="currentColor" stroke-width="1.4"/><circle cx="10" cy="13.5" r="1" fill="currentColor"/></svg><input type="password" id="regPass" placeholder="อย่างน้อย 8 ตัวอักษร"><button class="tog-pw" type="button"><svg viewBox="0 0 20 20" fill="none"><path d="M2 10C2 10 5 4 10 4C15 4 18 10 18 10C18 10 15 16 10 16C5 16 2 10 2 10Z" stroke="currentColor" stroke-width="1.4"/><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/></svg></button></div></div>
            <div class="inp-g"><label data-i="lConfirm">ยืนยันรหัสผ่าน</label><div class="inp-w"><svg class="ic" viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.4"/><path d="M7 9V6C7 4.34 8.34 3 10 3C11.66 3 13 4.34 13 6V9" stroke="currentColor" stroke-width="1.4"/><path d="M8 14L9.5 15.5L12.5 12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg><input type="password" id="regConfirm" placeholder="••••••••"></div></div>
            <label class="chk-label terms"><input type="checkbox" id="agreeTerms"><span class="chk"></span><span><span data-i="agree">ยอมรับ</span> <a href="#" data-i="terms">ข้อกำหนด</a> <span data-i="and">และ</span> <a href="#" data-i="privacy">นโยบายความเป็นส่วนตัว</a></span></label>
            <button class="btn-p" id="btnAuth"><span data-i="btnReg">สมัครสมาชิก</span><svg viewBox="0 0 20 20" fill="none" width="18" height="18"><path d="M4 10H16M12 6L16 10L12 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
            <div class="switch-p"><span data-i="hasAcc">มีบัญชีอยู่แล้ว?</span> <a href="login.html" data-i="signIn">เข้าสู่ระบบ</a></div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
